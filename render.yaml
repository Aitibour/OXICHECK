services:
  - type: web
    name: hotelcheckin-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    region: ohio
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: FRONTEND_URL
        value: "https://hotelcheckin-ca.netlify.app"
      - key: SENDGRID_FROM_EMAIL
        value: "noreply@hotelcheckin.ca"
      - key: LOG_LEVEL
        value: "info"
