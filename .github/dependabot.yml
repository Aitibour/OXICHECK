version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 10
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "supertest"
          - "@types/supertest"
      turbo:
        patterns:
          - "turbo"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"
