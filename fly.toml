app = 'hotelcheckin-api'
primary_region = 'yyz'

[build]
  dockerfile = 'apps/api/Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  FRONTEND_URL = 'https://hotelcheckin-ca.netlify.app'
  SENDGRID_FROM_EMAIL = 'noreply@hotelcheckin.ca'
  LOG_LEVEL = 'info'
  JWT_EXPIRES_IN = '15m'
  JWT_REFRESH_EXPIRES_IN = '7d'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  path = '/api/health'
  timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
